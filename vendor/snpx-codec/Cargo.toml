[package]
name = "snpx-codec"
version = "0.1.3"
edition = "2021"
rust-version = "1.88"
publish = false

[[bin]]
name = "fanuc-snpx-tool"
path = "src/bin/fanuc_snpx_tool.rs"

[dependencies]
async-trait = "0.1"
bytes = "1"
futures-util = { version = "0.3", features = ["sink"] }
thiserror = "2"
tokio = { version = "1", features = ["net", "io-util", "time", "macros", "rt-multi-thread"] }
tokio-util = { version = "0.7", features = ["codec"] }
tracing = "0.1"
zerocopy = { version = "0.8", features = ["derive"] }

[dev-dependencies]
arbitrary = "1"
pretty_assertions = "1"
proptest = "1"
tokio = { version = "1", features = ["full", "test-util"] }
tokio-test = "0.4"

[lints.rust]
unsafe_code = "forbid"
missing_docs = "warn"

[lints.clippy]
pedantic = { level = "warn", priority = -1 }
